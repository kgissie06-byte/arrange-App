<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- user-scalable=no: ピンチズーム無効 / interactive-widget=resizes-content: キーボード表示でもビューポートサイズを変えない -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>育成管理</title>
</head>
<body>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--card:#FFFDF9;--border:#E8E2D8;--bm:#D4CCBE;
  --t:#2C2C2A;--t2:#6B6460;--t3:#A09890;
  --acc:#634B38;--acc-bg:#EDE5D8;--acc-lt:#FFF5E8;
  --tab:#3C3489;--toast-bg:#3C3489;--toast-c:#EEEDFE;
  --danger:#791F1F;--danger-bg:#FCEBEB;
}
body{font-family:var(--font-sans);color:var(--t);font-size:14px;background:var(--bg)}

/* ===== ログイン画面 ===== */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem 1.75rem;width:calc(100% - 2rem);max-width:340px;text-align:center}
.login-box h1{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--t)}
.login-box p{font-size:12px;color:var(--t2);margin-bottom:1.5rem}
.login-box input{width:100%;padding:10px 12px;font-size:16px;border:1px solid var(--bm);border-radius:10px;background:var(--bg);color:var(--t);font-family:inherit;text-align:center;letter-spacing:2px;margin-bottom:10px}
.login-box input:focus{outline:none;border-color:var(--tab);box-shadow:0 0 0 2px rgba(60,52,137,.12)}
.login-box button{width:100%;padding:10px;font-size:13px;border:none;border-radius:10px;background:var(--acc);color:#FFF8F0;cursor:pointer;font-family:inherit;font-weight:500;transition:opacity .15s}
.login-box button:hover{opacity:.88}
.login-error{font-size:11px;color:var(--danger);margin-top:6px;min-height:16px}

/* ===== ローディングオーバーレイ ===== */
#loading-overlay{position:fixed;inset:0;background:rgba(247,244,239,.78);z-index:8000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#loading-overlay.show{display:flex}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--tab);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:var(--t2)}
.wrap{min-height:100vh;background:var(--bg);padding-bottom:3rem}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 1rem;position:sticky;top:0;z-index:80}
.tabs{display:flex;gap:0;overflow-x:auto}
.tab{padding:11px 15px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--t2);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:color .15s;font-family:inherit}
.tab.active{color:var(--tab);border-bottom-color:var(--tab);font-weight:500}
.tab:hover:not(.active){color:var(--t);background:var(--acc-bg)}
.content{padding:1.125rem 1rem;max-width:920px;margin:0 auto;position:relative}
.page{display:none}.page.active{display:block}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.sec-head h2{font-size:14px;font-weight:500}
.btn{padding:6px 13px;font-size:12px;border:1px solid var(--bm);border-radius:8px;background:var(--card);cursor:pointer;color:var(--t);font-family:inherit;white-space:nowrap;transition:background .15s}
.btn:hover{background:var(--acc-bg)}
.btn.pri{background:var(--acc);color:#FFF8F0;border-color:var(--acc)}
.btn.pri:hover{opacity:.88}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.danger{color:var(--danger);border-color:#F09595;background:var(--card)}
.btn.danger:hover{background:var(--danger-bg)}
.back-btn{font-size:12px;cursor:pointer;padding:5px 11px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--t2);font-family:inherit;transition:background .15s}
.back-btn:hover{background:var(--acc-bg)}

/* ① 育成入力 */
.grid-members{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:9px}
.grid-chars{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.m-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 8px;cursor:pointer;text-align:center;transition:border-color .15s,background .15s}
.m-card:hover{border-color:var(--bm);background:var(--acc-lt)}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:13px;margin:0 auto 6px}
.m-name{font-size:12px;font-weight:500}.m-sub{font-size:11px;color:var(--t2);margin-top:2px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px;cursor:pointer;transition:border-color .15s}
.cc:hover{border-color:var(--bm)}.cc.sel{border:1.5px solid var(--tab);background:#FAFAFE}
.cc-name{font-size:12px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badges{display:flex;gap:3px;flex-wrap:wrap}
.bdg{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500}
.panel{margin-top:10px;padding:13px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.pick-label{font-size:11px;color:var(--t2);margin-bottom:4px;font-weight:500}
.pick-btns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.p-btn{padding:4px 9px;font-size:11px;border:1px solid var(--bm);border-radius:7px;background:var(--bg);cursor:pointer;color:var(--t);font-family:inherit;transition:all .15s}
.p-btn:hover{background:var(--acc-bg)}
.save-bar{display:flex;justify-content:flex-end;margin-top:1rem;gap:7px}

/* ② 育成検索 */
.search-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.875rem;align-items:center}
.search-row input,.fil-input{flex:1;min-width:130px;padding:7px 10px;font-size:16px;border:1px solid var(--bm);border-radius:8px;background:var(--card);color:var(--t);font-family:inherit}
.fil-sec{margin-bottom:.625rem}
.fil-label{font-size:11px;color:var(--t2);margin-bottom:4px;font-weight:500}
.fil-btns{display:flex;gap:4px;flex-wrap:wrap}
.f-btn{padding:3px 9px;font-size:11px;border:1px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;color:var(--t2);font-family:inherit;transition:all .15s}
.f-btn:hover{color:var(--t);background:var(--acc-bg)}
.f-btn.on{font-weight:500;color:var(--acc);background:var(--acc-bg);border-color:var(--bm)}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 11px;display:flex;align-items:center;gap:9px;margin-bottom:6px}
.res-card.already{opacity:.55;background:var(--bg)}
.res-card.already .res-already-tag{display:inline-block}
.res-already-tag{display:none;font-size:10px;padding:1px 6px;border-radius:10px;background:var(--acc-bg);color:var(--acc);border:.5px solid var(--bm);margin-left:5px}
.av2{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}

/* ③ 援軍表 */
.reinf-wrap{overflow-x:auto;margin-top:.875rem}
.reinf-table{border-collapse:collapse;width:100%}
.reinf-table th,.reinf-table td{border:1px solid var(--border);padding:0;font-size:12px;text-align:left;vertical-align:middle}
.reinf-table th{background:var(--acc-bg);color:var(--acc);font-weight:500;font-size:11px;padding:7px 10px;white-space:nowrap}
.rt-name{min-width:120px;max-width:160px}
.rt-pair{min-width:130px}
.rt-del{width:42px;text-align:center}
.name-cell{cursor:pointer;padding:7px 10px;color:var(--t2);font-style:italic}
.name-cell.filled{color:var(--t);font-style:normal;font-weight:500}
.name-cell:hover{background:var(--acc-lt)}
.pair-cell-inner{display:flex;align-items:center;gap:5px;padding:7px 10px;cursor:pointer;font-size:12px}
.pair-cell-inner:hover{background:var(--acc-lt)}
.pair-sep{color:var(--t3);font-size:11px}
.del-btn{display:flex;align-items:center;justify-content:center;padding:7px 8px;cursor:pointer;color:var(--t3);font-size:14px;transition:color .15s;border-left:1px solid var(--border)}
.del-btn:hover{color:var(--danger);background:var(--danger-bg)}
.add-row-btn{display:flex;align-items:center;gap:6px;margin-top:8px;padding:7px 10px;font-size:12px;color:var(--t2);cursor:pointer;border:1px dashed var(--bm);border-radius:8px;background:none;font-family:inherit;width:100%;transition:background .15s}
.add-row-btn:hover{background:var(--acc-bg);color:var(--t)}

/* キャラ管理 */
.grid-charlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.c-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px}
.sub-tabs{display:flex;gap:5px;margin-bottom:1rem}
.sub-tab{padding:5px 13px;font-size:11px;border:1px solid var(--bm);border-radius:20px;cursor:pointer;background:var(--bg);color:var(--t2);font-family:inherit;transition:all .15s}
.sub-tab.active{background:var(--acc);color:#FFF8F0;border-color:var(--acc)}
.field{margin-bottom:9px}
.field label{display:block;font-size:11px;color:var(--t2);margin-bottom:3px}
.field input,.field select{width:100%;padding:7px 10px;font-size:16px;border:1px solid var(--bm);border-radius:8px;background:var(--bg);color:var(--t);font-family:inherit}

/* モーダル */
.overlay{position:fixed;inset:0;background:rgba(44,34,24,.42);display:flex;align-items:flex-start;justify-content:center;padding-top:48px;z-index:300;overflow-y:auto}
.modal{background:var(--card);border:1px solid var(--bm);border-radius:14px;padding:1.125rem;width:calc(100% - 2rem);max-width:480px;margin-bottom:48px}
.modal h3{font-size:14px;font-weight:500;margin-bottom:12px}
.modal-acts{display:flex;gap:7px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}

/* 援軍専用検索パネル (full-screen overlay) */
.reinf-search-overlay{position:fixed;inset:0;background:var(--bg);z-index:400;overflow-y:auto;display:flex;flex-direction:column}
.reinf-search-header{background:var(--card);border-bottom:1px solid var(--border);padding:.875rem 1rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.reinf-search-header h3{font-size:13px;font-weight:500;flex:1}
.reinf-search-body{padding:1rem;max-width:680px;width:100%;margin:0 auto;flex:1}
.reinf-search-filters{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:.875rem}
.filter-group-title{font-size:11px;font-weight:500;color:var(--acc);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.reinf-results-list{display:flex;flex-direction:column;gap:6px}
.reinf-res-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.reinf-res-card.already{background:var(--bg);border-color:var(--border);opacity:.6}
.add-to-table-btn{margin-left:auto;flex-shrink:0;padding:5px 11px;font-size:11px;border:1px solid var(--bm);border-radius:7px;background:var(--card);cursor:pointer;color:var(--acc);font-weight:500;font-family:inherit;white-space:nowrap;transition:all .15s}
.add-to-table-btn:hover:not(:disabled){background:var(--acc-bg)}
.add-to-table-btn:disabled{opacity:.4;cursor:default}
.already-tag{font-size:10px;padding:1px 7px;border-radius:10px;background:var(--acc-bg);color:var(--acc);border:.5px solid var(--bm);margin-left:auto;flex-shrink:0}
.empty{color:var(--t3);text-align:center;padding:1.5rem;font-size:12px}
hr.div{border:none;border-top:1px solid var(--border);margin:1.125rem 0}
.toast-fixed{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--toast-bg);color:var(--toast-c);border-radius:20px;padding:8px 18px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast-fixed.show{opacity:1}
/* ===== 宿縁 ===== */
.shukuen-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:5px}
.shukuen-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.shukuen-dot.gikkyoku{background:#7F77DD}
.shukuen-dot.omote6{background:#1D9E75}
.shukuen-dot.soji{background:#C89B20}
.shukuen-count{font-size:11px;font-weight:500;color:var(--t2);margin-right:6px}
/* 宿縁ピル (検索結果カード内) */
.sh-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px 2px 5px;border-radius:20px;font-size:11px;font-weight:600;line-height:1.4}
.sh-pill.gikkyoku{background:#EEEDFE;color:#4B44AA;border:.5px solid #AFA9EC}
.sh-pill.omote6{background:#E1F5EE;color:#0E6B55;border:.5px solid #1D9E75}
.sh-pill.soji{background:#FDF6E0;color:#7A5E10;border:.5px solid #C89B20}
.sh-pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sh-pill.gikkyoku .sh-pill-dot{background:#7F77DD}
.sh-pill.omote6 .sh-pill-dot{background:#1D9E75}
.sh-pill.soji .sh-pill-dot{background:#C89B20}
.sh-badge-wrap{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:5px}
.shukuen-member-list{display:flex;flex-direction:column;gap:4px;margin-top:6px;padding:8px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.shukuen-char-row{display:flex;align-items:center;gap:6px;padding:3px 0}
.shukuen-add-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;font-size:11px;border:1px dashed var(--bm);border-radius:7px;background:none;cursor:pointer;color:var(--t2);font-family:inherit;transition:background .15s;margin-top:5px}
.shukuen-add-btn:hover{background:var(--acc-bg);color:var(--t)}
.shukuen-remove-btn{padding:1px 6px;font-size:11px;border:1px solid #F09595;border-radius:6px;background:none;cursor:pointer;color:var(--danger);font-family:inherit;line-height:1.4}
.shukuen-remove-btn:hover{background:var(--danger-bg)}
.shukuen-toggle{display:flex;gap:6px;margin-bottom:8px}
.shukuen-toggle button{padding:4px 12px;font-size:11px;border:1px solid var(--bm);border-radius:20px;background:var(--bg);cursor:pointer;color:var(--t2);font-family:inherit;transition:all .15s}
.shukuen-toggle button.on{background:var(--acc);color:#FFF8F0;border-color:var(--acc)}
/* ===== ログアウトボタン / 管理バー ===== */
.top-action-bar{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:4px 1rem;background:var(--card);border-bottom:1px solid var(--border);font-size:11px;color:var(--t2)}
.logout-btn{padding:3px 11px;font-size:11px;border:1px solid var(--bm);border-radius:20px;background:none;cursor:pointer;color:var(--t2);font-family:inherit;transition:background .15s}
.logout-btn:hover{background:var(--acc-bg);color:var(--t)}
.role-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.role-badge.admin{background:#EEEDFE;color:#3C3489;border:.5px solid #AFA9EC}
.role-badge.user{background:var(--acc-bg);color:var(--acc);border:.5px solid var(--bm)}
/* ===== 縦画面固定（スマホのみ）===== */
/* max-height:600px かつ landscape = スマホの横向き */
@media screen and (orientation: landscape) and (max-height: 600px) {
  body::before{
    content:'縦画面でご利用ください';
    position:fixed;inset:0;background:var(--bg);z-index:99999;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;color:var(--t2);
  }
  body>*{display:none!important}
  body::before{display:flex!important}
}
/* キーボード表示時にbodyを固定 */
body{overscroll-behavior:none}
/* ===== ホバースタイルをポインターデバイス限定に（タッチ後に残らないよう） ===== */
@media (hover: none) {
  /* タッチデバイスではhover・focus・activeスタイルをすべて無効化 */
  .tab:hover:not(.active), .tab:active:not(.active),
  .btn:hover, .btn.pri:hover, .btn:active,
  .back-btn:hover, .back-btn:active,
  .m-card:hover, .m-card:active,
  .cc:hover, .cc:active,
  .p-btn:hover, .p-btn:active,
  .f-btn:hover, .f-btn:active,
  .name-cell:hover, .name-cell:active,
  .pair-cell-inner:hover, .pair-cell-inner:active,
  .del-btn:hover, .del-btn:active,
  .add-row-btn:hover, .add-row-btn:active,
  .sub-tab:hover, .sub-tab:active,
  .logout-btn:hover, .logout-btn:active,
  .shukuen-add-btn:hover, .shukuen-add-btn:active,
  .shukuen-remove-btn:hover, .shukuen-remove-btn:active,
  .add-to-table-btn:hover:not(:disabled), .add-to-table-btn:active,
  .login-box button:hover, .login-box button:active,
  .shukuen-toggle button:hover, .shukuen-toggle button:active,
  .c-card:hover, .c-card:active
  { background:revert !important; opacity:revert !important; color:revert !important; border-color:revert !important; }

  *:focus, *:focus-visible { outline: none !important; box-shadow: none !important; border-color: inherit !important; }
}
</style>

<!-- ローディングオーバーレイ -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">処理中...</div>
</div>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-box">
    <h1>育成管理</h1>
    <p>パスワードを入力してください</p>
    <input type="password" id="login-pw" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ログイン</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div class="wrap" id="main-wrap" style="display:none">
<div class="top-action-bar">
  <span id="role-badge-wrap"></span>
  <button class="logout-btn admin-only" onclick="openChangePwModal()">🔑 パスワード変更</button>
  <button class="logout-btn" onclick="doLogout()">ログアウト</button>
</div>
<div class="top-bar">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('input',this)">① 育成入力</button>
    <button class="tab" onclick="switchTab('search',this)">② 育成検索</button>
    <button class="tab admin-only" onclick="switchTab('reinf',this)">③ 援軍表</button>
    <button class="tab admin-only" onclick="switchTab('chars',this)">④ キャラ管理</button>
  </div>
</div>

<div class="content">
<div class="toast-fixed" id="toast"></div>

<!-- ① 育成入力 -->
<div id="page-input" class="page active">
  <div id="v-members">
    <div class="sec-head">
      <h2>メンバーを選択</h2>
      <div style="display:flex;gap:6px">
        <button class="btn input-admin-only" onclick="openMemberModal('add')">+ 追加</button>
        <button class="btn input-admin-only" onclick="openMemberModal('edit')">編集</button>
      </div>
    </div>
    <div class="grid-members" id="member-list"></div>
  </div>
  <div id="v-chars" style="display:none">
    <div class="sec-head">
      <h2 id="editing-name"></h2>
      <button class="back-btn" onclick="goBack()">← 戻る</button>
    </div>
    <div class="grid-chars" id="char-grid-edit"></div>
    <div id="lv-panel" style="display:none">
      <div class="panel">
        <div style="font-size:12px;font-weight:500;margin-bottom:11px" id="panel-title"></div>
        <div class="pick-label">レアリティ</div>
        <div class="pick-btns" id="rar-btns"></div>
        <div class="pick-label">ランク</div>
        <div class="pick-btns" id="rank-btns"></div>
        <div style="font-size:11px;color:var(--t2);margin-top:2px">選択中: <span id="cur-pick-txt" style="font-weight:500;color:var(--t)">未選択</span></div>
      </div>
    </div>
    <div class="save-bar">
      <button class="btn" onclick="goBack()">キャンセル</button>
      <button class="btn pri input-admin-only" onclick="saveTraining()">Save</button>
    </div>
  </div>
</div>

<!-- ② 育成検索 (standalone) -->
<div id="page-search" class="page">
  <div class="search-row">
    <input type="text" id="s-input" placeholder="キャラ名を入力..." oninput="renderSearch()">
    <button class="btn pri" onclick="renderSearch()">Search</button>
  </div>
  <div class="fil-sec"><div class="fil-label">レアリティ</div><div class="fil-btns" id="fil-rar"></div></div>
  <div class="fil-sec"><div class="fil-label">ランク</div><div class="fil-btns" id="fil-rank"></div></div>
  <div class="fil-sec"><div class="fil-label">所属</div><div class="fil-btns" id="fil-role"></div></div>

<script>
// タッチ操作後にフォーカス・アクティブ状態を即座に解除
document.addEventListener('touchend', () => {
  setTimeout(() => {
    const el = document.activeElement;
    // input・select・textareaはキーボード入力が必要なのでblurしない
    if (el && el !== document.body && !['INPUT','SELECT','TEXTAREA'].includes(el.tagName)) {
      el.blur();
    }
  }, 100);
}, { passive: true });

const ALL_RARITIES=['LG3','LG2','LG1','LG','UR','SR','R','N'];
const ALL_RANKS=['全技極','裏技極','技極','表1','表2','表3','表4','表5','表6','裏1','裏2','裏3','裏4','裏5','裏6'];

// レアリティ階層：クリックしたレアリティ以下をすべて返す
const RAR_ORDER=['LG3','LG2','LG1','LG','UR','SR','R','N'];
function getRarImplied(r){
  const idx=RAR_ORDER.indexOf(r);
  if(idx<0)return[r];
  return RAR_ORDER.slice(idx);
}

// ランク階層：クリックしたランクが含むランク一覧を返す
const OMOTE_RANKS=['表1','表2','表3','表4','表5','表6'];
const URA_RANKS=['裏1','裏2','裏3','裏4','裏5','裏6'];
function getRankImplied(r){
  if(r==='全技極') return['全技極','裏技極','技極',...OMOTE_RANKS,...URA_RANKS];
  if(r==='裏技極') return['裏技極',...OMOTE_RANKS,...URA_RANKS];
  if(r==='技極')   return['技極',...OMOTE_RANKS,'裏1'];
  if(OMOTE_RANKS.includes(r)){
    // 表N以下の表ランクをすべて含む
    const idx=OMOTE_RANKS.indexOf(r);
    return OMOTE_RANKS.slice(0,idx+1);
  }
  if(URA_RANKS.includes(r)){
    // 裏Nは裏N以下の裏ランク＋表1〜6すべてを含む
    const idx=URA_RANKS.indexOf(r);
    return[...URA_RANKS.slice(0,idx+1),...OMOTE_RANKS];
  }
  return[r];
}

// レアリティフィルター判定：フィルターに選んだレアリティ以上（より上位）も含める
// 例：フィルターにLGを選んだ場合、LG・LG1・LG2・LG3を持つメンバーもヒット
function rarMatchesFilter(memberRar, filterRars){
  if(!filterRars.length) return true;
  // filterRarsのどれかに対して、memberRarがそのレアリティ以上（RAR_ORDER上でより左）ならtrue
  return filterRars.some(fr=>{
    const fi=RAR_ORDER.indexOf(fr);
    const mi=RAR_ORDER.indexOf(memberRar);
    return mi>=0&&fi>=0&&mi<=fi; // memberRarがfrと同じかより上位
  });
}

// 選択配列をトグル（階層考慮）
function toggleWithHierarchy(arr, r, impliedFn){
  const implied=impliedFn(r);
  const allOn=implied.every(x=>arr.includes(x));
  if(allOn){
    // すでに全部ON → 全部OFF
    implied.forEach(x=>{const i=arr.indexOf(x);if(i>=0)arr.splice(i,1);});
  } else {
    // 一部または全部OFF → 全部ON
    implied.forEach(x=>{if(!arr.includes(x))arr.push(x);});
  }
}
const RAR_S={
  'LG3':{bg:'#FAEEDA',c:'#412402',bd:'#EF9F27'},
  'LG2':{bg:'#FAEEDA',c:'#633806',bd:'#BA7517'},
  'LG1':{bg:'#FFF0D0',c:'#7A4A10',bd:'#D48A20'},
  'LG': {bg:'#FFF0D0',c:'#854F0B',bd:'#EF9F27'},
  'UR': {bg:'#EEEDFE',c:'#3C3489',bd:'#7F77DD'},
  'SR': {bg:'#E6F1FB',c:'#0C447C',bd:'#378ADD'},
  'R':  {bg:'#E1F5EE',c:'#085041',bd:'#1D9E75'},
  'N':  {bg:'#F1EFE8',c:'#5F5E5A',bd:'#B4B2A9'},
};
const TOP_RANKS=['全技極','裏技極','技極'];
const AVC=[
  {bg:'#E6F1FB',c:'#0C447C'},{bg:'#E1F5EE',c:'#085041'},
  {bg:'#FAEEDA',c:'#633806'},{bg:'#FBEAF0',c:'#72243E'},
  {bg:'#EEEDFE',c:'#3C3489'},{bg:'#FAECE7',c:'#993C1D'},
  {bg:'#EAF3DE',c:'#27500A'},{bg:'#FCEBEB',c:'#791F1F'},
];

let S={
  members:[
  ],
  chars:[
  ],
  // reinf rows: {id, memberName(null), normalMain, normalSub, castleMain, castleSub}
  reinf:[],
  nextId:5, nextReinfId:1,
  filRar:[],filRank:[],filRole:[],
};
let E={memberId:null,charName:null,pendingRar:null,pendingRanks:[]};
let cnSelRar=[],cnSelRank=[],cuSelRar=[],cuSelRank=[];
// 援軍検索状態
let RS={rowId:null,mainRar:[],mainRank:[],subRar:[],subRank:[],roleFilter:[]};

function esc(s){return(s||'').replace(/'/g,"\\'");}
function av(i){return AVC[((i%AVC.length)+AVC.length)%AVC.length];}
function ini(n){return n.slice(0,2).toUpperCase();}
function rarBdg(r){const s=RAR_S[r]||{bg:'#F1EFE8',c:'#5F5E5A',bd:'#B4B2A9'};return`<span class="bdg" style="background:${s.bg};color:${s.c};border:.5px solid ${s.bd}">${r}</span>`;}
function rankBdg(r){const top=TOP_RANKS.includes(r);return`<span class="bdg" style="background:${top?'#EEEDFE':'#F1EFE8'};color:${top?'#3C3489':'#5F5E5A'};border:.5px solid ${top?'#AFA9EC':'#D3D1C7'}">${r}</span>`;}

// ランク表示を要約：選択済みランク配列から表示すべきランクの配列を返す
function summarizeRanks(ranks){
  if(!ranks||!ranks.length) return[];
  if(ranks.includes('全技極')) return['全技極'];
  if(ranks.includes('裏技極')) return['裏技極'];
  const URA_ORDER=['裏6','裏5','裏4','裏3','裏2','裏1'];
  const OMOTE_ORDER=['表6','表5','表4','表3','表2','表1'];
  const topUra=URA_ORDER.find(r=>ranks.includes(r));
  if(ranks.includes('技極')){
    return topUra?['技極',topUra]:['技極'];
  }
  // 技極なし：裏→表の優先順で最大1つ
  const best=topUra||OMOTE_ORDER.find(r=>ranks.includes(r));
  return best?[best]:[];
}
async function load() {
  showLoading();
  try {
    const res = await fetch('/api/init');
    const data = await res.json();
    S = data;
    renderAll();
  } finally {
    hideLoading();
  }
}


function renderAll(){
  renderMembers();renderCharListDisplay();renderReinfTable();renderFilters();renderCharUpdateSel();
}

/* ========== ① 育成入力 ========== */
function renderMembers(){
  const el=document.getElementById('member-list');
  // 利用者ロールでは「その他」所属のメンバーを表示しない
  const visible = currentRole === 'user'
    ? S.members.filter(m => m.role !== 'その他')
    : S.members;
  if(!visible.length){el.innerHTML='<div class="empty">メンバーがいません</div>';return;}
  el.innerHTML=visible.map((m,i)=>{const a=av(S.members.indexOf(m));return`<div class="m-card" onclick="selectMember(${m.id})">
    <div class="avatar" style="background:${a.bg};color:${a.c}">${ini(m.name)}</div>
    <div class="m-name">${m.name}</div><div class="m-sub">${m.role}</div>
    <div class="m-sub">${m.chars.length}体育成中</div>
  </div>`;}).join('');
}
function selectMember(id){
  const m=S.members.find(x=>x.id===id);if(!m)return;
  E={memberId:id,charName:null,pendingRar:null,pendingRanks:[]};
  document.getElementById('editing-name').textContent=m.name+' の育成キャラ';
  document.getElementById('v-members').style.display='none';
  document.getElementById('v-chars').style.display='block';
  renderCharGridEdit(m);
  document.getElementById('lv-panel').style.display='none';
}
function renderCharGridEdit(m){
  document.getElementById('char-grid-edit').innerHTML=S.chars.map(cd=>{
    const c=m.chars.find(x=>x.name===cd.name);const isSel=E.charName===cd.name;
    return`<div class="cc${isSel?' sel':''}" onclick="selectCharEdit('${esc(cd.name)}')">
      <div class="cc-name" title="${cd.name}">${cd.name}</div>
      <div class="badges">${c?rarBdg(c.rar):''}${c&&c.ranks?summarizeRanks(c.ranks).map(rankBdg).join(''):''}
      ${!c?'<span style="font-size:10px;color:var(--t3)">未育成</span>':''}</div>
    </div>`;
  }).join('');
}
function selectCharEdit(cn){
  const m=S.members.find(x=>x.id===E.memberId);
  const c=m&&m.chars.find(x=>x.name===cn);
  const cd=S.chars.find(x=>x.name===cn);
  if(E.charName!==cn){
    E.charName=cn;E.pendingRar=c?c.rar:null;E.pendingRanks=c&&c.ranks?[...c.ranks]:[];
  }
  document.getElementById('panel-title').textContent=cn+' の育成状況';
  const aR=cd?cd.rars:ALL_RARITIES,aK=cd?cd.ranks:ALL_RANKS;
  document.getElementById('rar-btns').innerHTML=aR.map(r=>{const s=RAR_S[r]||{};const on=E.pendingRar===r;
    return`<button class="p-btn" onclick="pickRar('${r}')" style="${on?`background:${s.bg};color:${s.c};border-color:${s.bd};font-weight:500`:''}">${r}</button>`;}).join('');
  document.getElementById('rank-btns').innerHTML=aK.map(r=>{const on=E.pendingRanks.includes(r);const top=TOP_RANKS.includes(r);
    return`<button class="p-btn" onclick="pickRank('${r}')" style="${on?`background:${top?'#EEEDFE':'#EDE5D8'};color:${top?'#3C3489':'#634B38'};border-color:${top?'#AFA9EC':'#B4A494'};font-weight:500`:''}">${r}${on?'<span style="margin-left:2px;font-size:9px">✓</span>':''}</button>`;}).join('');
  document.getElementById('lv-panel').style.display='block';
  document.getElementById('cur-pick-txt').textContent=E.pendingRar&&E.pendingRanks.length?E.pendingRar+' / '+E.pendingRanks.join('・'):E.pendingRar?E.pendingRar+' (ランク未選択)':'未選択';
  renderCharGridEdit(m);
}
function pickRar(r){E.pendingRar=r;selectCharEdit(E.charName);}
function pickRank(r){
  const cd=S.chars.find(x=>x.name===E.charName);
  const allowed=cd?cd.ranks:ALL_RANKS;
  toggleWithHierarchy(E.pendingRanks,r,v=>getRankImplied(v).filter(x=>allowed.includes(x)));
  selectCharEdit(E.charName);
}
async function saveTraining(){
  if(!E.charName){toast('キャラを選んでください');return;}
  if(!E.pendingRar||!E.pendingRanks.length){toast('選択してください');return;}

  showLoading();
  try{
    await fetch('/api/training', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        memberId:E.memberId,
        charName:E.charName,
        rar:E.pendingRar,
        ranks:E.pendingRanks
      })
    });

    await load();
    toast('保存しました');
    goBack();

  }catch(e){
    toast('エラー');
  } finally {
    hideLoading();
  }
}

function goBack(){
  document.getElementById('v-members').style.display='';
  document.getElementById('v-chars').style.display='none';
  E={memberId:null,charName:null,pendingRar:null,pendingRanks:[]};
}

/* ========== ② 育成検索 ========== */
function renderFilters(){
  const allRoles=[...new Set(S.members.map(m=>m.role))].filter(r=>r!=='その他');
  document.getElementById('fil-rar').innerHTML=ALL_RARITIES.map(r=>{const on=S.filRar.includes(r);const s=RAR_S[r]||{};
    return`<button class="f-btn${on?' on':''}" onclick="toggleFil('rar','${r}')" style="${on?`background:${s.bg};color:${s.c};border-color:${s.bd}`:''}"> ${r}</button>`;}).join('');
  document.getElementById('fil-rank').innerHTML=ALL_RANKS.map(r=>{const on=S.filRank.includes(r);const top=TOP_RANKS.includes(r);
    return`<button class="f-btn${on?' on':''}" onclick="toggleFil('rank','${r}')" style="${on?(top?'background:#EEEDFE;color:#3C3489;border-color:#AFA9EC':'background:#EDE5D8;color:#634B38;border-color:#B4A494'):''}"> ${r}</button>`;}).join('');
  document.getElementById('fil-role').innerHTML=allRoles.map(r=>{const on=S.filRole.includes(r);
    return`<button class="f-btn${on?' on':''}" onclick="toggleFil('role','${r}')"> ${r}</button>`;}).join('');
}
function toggleFil(type,val){
  const key=type==='rar'?'filRar':type==='rank'?'filRank':'filRole';
  const i=S[key].indexOf(val);if(i>=0)S[key].splice(i,1);else S[key].push(val);
  renderFilters();renderSearch();
}
function renderSearch(alreadyNames){
  const q=(document.getElementById('s-input').value||'').trim();
  const el=document.getElementById('search-results');
  if(!q){el.innerHTML='<div class="empty">キャラ名を入力してください</div>';return;}
  const matched=S.chars.filter(cd=>cd.name.includes(q));
  if(!matched.length){el.innerHTML='<div class="empty">該当キャラが見つかりません</div>';return;}
  let rows=[];
  matched.forEach(cd=>{S.members.forEach((m,mi)=>{
    if(m.role==='その他')return; // 管理者・利用者ともに非表示
    const c=m.chars.find(x=>x.name===cd.name);if(!c)return;
    if(!rarMatchesFilter(c.rar, S.filRar))return;
    if(S.filRank.length&&!S.filRank.every(fr=>c.ranks&&c.ranks.includes(fr)))return;
    if(S.filRole.length&&!S.filRole.includes(m.role))return;
    const a=av(mi);
    const shBadge=shukuenBadgeHtml(m,cd);
    rows.push(`<div class="res-card"><div class="av2" style="background:${a.bg};color:${a.c}">${ini(m.name)}</div>
      <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500">${m.name} <span style="font-size:10px;color:var(--t2)">${m.role}</span></div>
      <div style="font-size:10px;color:var(--t2);margin:1px 0">${cd.name}</div>
      <div class="badges" style="margin-top:3px">${rarBdg(c.rar)}${c.ranks?summarizeRanks(c.ranks).map(rankBdg).join(''):''}</div>
      ${shBadge}</div></div>`);
  });});
  if(!rows.length){el.innerHTML='<div class="empty">条件に合うメンバーがいません</div>';return;}
  el.innerHTML=`<div style="font-size:11px;color:var(--t2);margin-bottom:7px">${rows.length}件</div>`+rows.join('');
}

function toggleRSFilter(key,val){
  let arr;
  if(key==='main-rar')arr=RS.mainRar;
  else if(key==='main-rank')arr=RS.mainRank;
  else if(key==='sub-rar')arr=RS.subRar;
  else arr=RS.subRank;
  const isRar=key.endsWith('rar');
  if(isRar){const i=arr.indexOf(val);if(i>=0)arr.splice(i,1);else arr.push(val);}
  else{const i=arr.indexOf(val);if(i>=0)arr.splice(i,1);else arr.push(val);}
  const row=S.reinf.find(r=>r.id===RS.rowId);if(!row)return;
  const mainCd=S.chars.find(c=>c.name===row.normalMain);
  const subCd=S.chars.find(c=>c.name===row.normalSub);
  renderRSFilterBtns('rs-main-rar',mainCd?mainCd.rars:ALL_RARITIES,RS.mainRar,'main-rar');
  renderRSFilterBtns('rs-main-rank',mainCd?mainCd.ranks:ALL_RANKS,RS.mainRank,'main-rank');
  if(row.normalSub){
    renderRSFilterBtns('rs-sub-rar',subCd?subCd.rars:ALL_RARITIES,RS.subRar,'sub-rar');

function toggleRSRole(val){const i=RS.roleFilter.indexOf(val);if(i>=0)RS.roleFilter.splice(i,1);else RS.roleFilter.push(val);
  const allRoles=[...new Set(S.members.map(m=>m.role))];

  renderRSResults();
}

function memberPassesRS(m,row){
  const mainName=row.normalMain;const subName=row.normalSub;
  if(mainName){
    const mc=m.chars.find(c=>c.name===mainName);if(!mc)return false;
    if(!rarMatchesFilter(mc.rar, RS.mainRar))return false;
    if(RS.mainRank.length&&!RS.mainRank.every(fr=>mc.ranks&&mc.ranks.includes(fr)))return false;
  }
  if(subName){
    const sc=m.chars.find(c=>c.name===subName);if(!sc)return false;
    if(!rarMatchesFilter(sc.rar, RS.subRar))return false;
    if(RS.subRank.length&&!RS.subRank.every(fr=>sc.ranks&&sc.ranks.includes(fr)))return false;
  }
  if(RS.roleFilter.length&&!RS.roleFilter.includes(m.role))return false;
  return true;
}

/* 宿縁レベル計算: メンバーの育成データからレベルを判定 */
// ranks配列に技極・裏技極が含まれる → 'gikkyoku'
// 技極なしで表6以上 → 'omote6'  (表6, 裏1〜裏6, 裏技極は除外済みなのでこちら考慮不要)
// それ以外で何か入力あり → 'soji'
// 未入力 → null
function shukuenLevel(memberChar){
  if(!memberChar||!memberChar.ranks||!memberChar.ranks.length) return null;
  const ranks=memberChar.ranks;
  if(ranks.includes('全技極')||ranks.includes('裏技極')||ranks.includes('技極')) return 'gikkyoku';
  const OMOTE6_AND_ABOVE=['表6','裏1','裏2','裏3','裏4','裏5','裏6'];
  if(OMOTE6_AND_ABOVE.some(r=>ranks.includes(r))) return 'omote6';
  return 'soji';
}

/* メンバーの宿縁バッジHTML生成 */
function shukuenBadgeHtml(member, charDef){
  if(!charDef||!charDef.shukuen||!charDef.shukuen.enabled) return '';
  const sMembers=charDef.shukuen.members||[];
  if(!sMembers.length) return '';
  let g=0,o=0,s=0;
  sMembers.forEach(sName=>{
    const mc=member.chars.find(c=>c.name===sName);
    const lv=shukuenLevel(mc);
    if(lv==='gikkyoku') g++;
    else if(lv==='omote6') o++;
    else if(lv==='soji') s++;
  });
  if(!g&&!o&&!s) return '';
  const total=sMembers.length;
  let pills='';
  if(g) pills+=`<span class="sh-pill gikkyoku"><span class="sh-pill-dot"></span>${g}</span>`;
  if(o) pills+=`<span class="sh-pill omote6"><span class="sh-pill-dot"></span>${o}</span>`;
  if(s) pills+=`<span class="sh-pill soji"><span class="sh-pill-dot"></span>${s}</span>`;
  return `<div class="sh-badge-wrap"><span style="font-size:10px;color:var(--t2)">宿縁</span>${pills}<span style="font-size:10px;color:var(--t3)">/${total}</span></div>`;
}

        <div style="font-size:10px;color:var(--t)">${sh.members.join('・')}</div>`
      :`<div style="font-size:10px;color:var(--t3);margin-top:4px">宿縁なし</div>`;
    return`<div class="c-card">
      <div style="font-size:12px;font-weight:500;margin-bottom:5px">${cd.name}</div>
      <div style="font-size:10px;color:var(--t2);margin-bottom:3px">レアリティ</div>
      <div class="badges" style="margin-bottom:5px">${cd.rars.map(rarBdg).join('')||'<span style="font-size:10px;color:var(--t3)">未設定</span>'}</div>
      <div style="font-size:10px;color:var(--t2);margin-bottom:3px">ランク</div>
      <div class="badges">${cd.ranks.map(rankBdg).join('')||'<span style="font-size:10px;color:var(--t3)">未設定</span>'}</div>
      ${shHtml}
    </div>`;
  }).join('');
}
function switchCharMode(mode,el){
  document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.getElementById('char-new-form').style.display=mode==='new'?'block':'none';
  document.getElementById('char-update-form').style.display=mode==='update'?'block':'none';
  if(mode==='new')initCharNewForm();if(mode==='update')renderCharUpdateSel();
}

/* ========== モーダル ========== */
function openModal(id,html){
  if(html){document.getElementById('modal-content').innerHTML=html;}
  document.getElementById('modal-overlay').style.display='flex';
}
const ROLE_OPTIONS=['乱咲','蕾','その他'];
function roleSelect(id,val=''){
  return`<select id="${id}">${ROLE_OPTIONS.map(r=>`<option value="${r}"${r===val?' selected':''}>${r}</option>`).join('')}</select>`;
}
function openMemberModal(mode){
  if(mode==='add'){
    openModal('member-add',`<h3>メンバー追加</h3>
      <div class="field"><label>名前</label><input type="text" id="mm-name" placeholder=""></div>
      <div class="field"><label>所属</label>${roleSelect('mm-role')}</div>
      <div class="modal-acts"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn pri" onclick="addMember()">追加</button></div>`);
  } else {
    if(!S.members.length){toast('メンバーがいません');return;}
    openModal('member-edit',`<h3>メンバー編集</h3>
      <div class="field"><label>メンバーを選択</label>
        <select id="me-sel" onchange="loadMemberEdit()"><option value="">-- 選択 --</option>${[...S.members].sort((a,b)=>a.name.localeCompare(b.name,'ja')).map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></div>
      <div id="me-detail" style="display:none">
        <div class="field"><label>名前</label><input type="text" id="me-name"></div>
        <div class="field"><label>所属</label>${roleSelect('me-role')}</div>
        <div class="modal-acts"><button class="btn danger" onclick="deleteMember()">削除</button><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn pri" onclick="saveMemberEdit()">保存</button></div>
      </div>`);
  }
}
function closeModal(){document.getElementById('modal-overlay').style.display='none';}
function loadMemberEdit(){const id=parseInt(document.getElementById('me-sel').value);const m=S.members.find(x=>x.id===id);if(!m){document.getElementById('me-detail').style.display='none';return;}document.getElementById('me-name').value=m.name;const roleEl=document.getElementById('me-role');roleEl.value=ROLE_OPTIONS.includes(m.role)?m.role:'その他';document.getElementById('me-detail').style.display='block';}
async function saveMemberEdit(){
  const id=parseInt(document.getElementById('me-sel').value);
  const name=document.getElementById('me-name').value;
  const role=document.getElementById('me-role').value;

  showLoading();
  try {
    await fetch(`/api/members/${id}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,role})
    });

    await load();
    closeModal();
    toast('更新しました');
  } finally {
    hideLoading();
  }
}

async function deleteMember(){
  const id=parseInt(document.getElementById('me-sel').value);

  showLoading();
  try {
    await fetch(`/api/members/${id}`,{
      method:'DELETE'
    });

    await load();
    closeModal();
    toast('削除しました');
  } finally {
    hideLoading();
  }
}

async function addMember(){
  const name=(document.getElementById('mm-name').value||'').trim();
  const role=(document.getElementById('mm-role').value||'').trim();
  if(!name)return;

  showLoading();
  try {
    const res = await fetch('/api/members', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, role })
    });

    if(!res.ok){
      throw new Error('保存失敗');
    }

    await load();

    closeModal();
    toast('追加しました');

  } catch(err){
    console.error(err);
    toast('エラーが発生しました');
  } finally {
    hideLoading();
  }
}


/* ========== タブ切替 ========== */
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='search'){renderFilters();renderSearch();}
  if(tab==='reinf')renderReinfTable();
  if(tab==='chars'){initCharNewForm();renderCharListDisplay();}
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

/* ========== ローディング ========== */
function showLoading(){document.getElementById('loading-overlay').classList.add('show');}
function hideLoading(){document.getElementById('loading-overlay').classList.remove('show');}

/* ========== ログイン (Supabase DB管理) ========== */
// パスワードはSupabaseのpasswordsテーブルで管理
// テーブル構成: id(text PK), password(text)
// レコード例: {id:'admin', password:'xxxx'}, {id:'user', password:'yyyy'}

let currentRole = null; // 'admin' or 'user'

// ===== 定期ポーリング（30秒ごとに全員の画面を更新） =====
let _pollTimer = null;
function startPolling(){
  stopPolling();
  _pollTimer = setInterval(async ()=>{
    if(!currentRole) return;
    try {
      const res = await fetch('/api/init');
      if(!res.ok) return;
      const data = await res.json();
      if(JSON.stringify(data) !== JSON.stringify(S)){
        S = data;
        renderAll();
        // 再描画後にフォーカスが残らないよう外す
        if(document.activeElement && document.activeElement !== document.body){
          document.activeElement.blur();
        }
      }
    } catch(e){ /* ネットワークエラーは無視 */ }
  }, 30000);
}
function stopPolling(){
  if(_pollTimer){ clearInterval(_pollTimer); _pollTimer = null; }
}

// ===== セッション保持 =====
function saveSession(role){ sessionStorage.setItem('role', role); }
function clearSession(){ sessionStorage.removeItem('role'); }
function getSavedRole(){ return sessionStorage.getItem('role'); }

// ページ読み込み時にセッション復元
(function restoreSession(){
  const saved = getSavedRole();
  if(saved){
    currentRole = saved;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-wrap').style.display = '';
    applyRole();
    load();
    startPolling();
  }
})();

async function doLogin(){
  const pw = (document.getElementById('login-pw').value || '').trim();
  const errEl = document.getElementById('login-error');
  const btn = document.querySelector('#login-screen button');
  if(!pw){ errEl.textContent = 'パスワードを入力してください'; return; }

  btn.disabled = true;
  btn.textContent = '確認中...';
  errEl.textContent = '';

  try {
    const res = await fetch('/api/auth/verify', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ password: pw })
    });
    const data = await res.json();
    if(!res.ok || !data.role){
      errEl.textContent = data.error || 'パスワードが違います';
      return;
    }
    currentRole = data.role; // 'admin' or 'user'
    saveSession(currentRole);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-wrap').style.display = '';
    applyRole();
    load();
    startPolling();
  } catch(e) {
    errEl.textContent = 'エラーが発生しました';
  } finally {
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
}

function doLogout(){
  currentRole = null;
  clearSession();
  stopPolling();
  document.getElementById('login-pw').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('main-wrap').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  // 最初のタブをリセット
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', i===0);
  });
  document.querySelectorAll('.page').forEach((p,i) => {
    p.classList.toggle('active', i===0);
  });
}

function applyRole(){
  const isAdmin = currentRole === 'admin';
  document.querySelectorAll('.admin-only').forEach(el => {
    el.style.display = isAdmin ? '' : 'none';
  });
  document.querySelectorAll('.input-admin-only').forEach(el => {
    el.style.display = isAdmin ? '' : 'none';
  });
  // ロールバッジ
  document.getElementById('role-badge-wrap').innerHTML =
    `<span class="role-badge ${isAdmin?'admin':'user'}">${isAdmin?'管理者':'利用者'}</span>`;
}

/* ========== パスワード変更モーダル (管理者専用) ========== */
function openChangePwModal(){
  openModal('change-pw', `<h3>利用者パスワード変更</h3>
    <div class="field"><label>新しいパスワード</label>
      <input type="password" id="cpw-new" placeholder="新パスワード">
    </div>
    <div class="field"><label>確認（もう一度入力）</label>
      <input type="password" id="cpw-confirm" placeholder="確認">
    </div>
    <div style="font-size:11px;color:var(--danger);min-height:14px;margin-bottom:4px" id="cpw-err"></div>
    <div class="modal-acts">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn pri" onclick="saveUserPassword()">変更</button>
    </div>`);
}

async function saveUserPassword(){
  const nw = (document.getElementById('cpw-new').value || '').trim();
  const cf = (document.getElementById('cpw-confirm').value || '').trim();
  const errEl = document.getElementById('cpw-err');
  if(!nw){ errEl.textContent = 'パスワードを入力してください'; return; }
  if(nw !== cf){ errEl.textContent = '確認パスワードが一致しません'; return; }
  if(nw.length < 4){ errEl.textContent = '4文字以上で設定してください'; return; }

  showLoading();
  try {
    const res = await fetch('/api/auth/change-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ role: 'user', password: nw })
    });
    const data = await res.json();
    if(!res.ok){ errEl.textContent = data.error || '変更に失敗しました'; return; }
    closeModal();
    toast('利用者パスワードを変更しました');
  } catch(e) {
    errEl.textContent = 'エラーが発生しました';
  } finally {
    hideLoading();
  }
}

</script>
