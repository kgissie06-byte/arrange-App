
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;
  --card:#FFFDF9;
  --border:#E8E2D8;
  --border-mid:#D4CCBE;
  --text:#2C2C2A;
  --text2:#6B6460;
  --text3:#A09890;
  --accent:#634B38;
  --accent-bg:#EDE5D8;
  --tab-active:#3C3489;
  --toast-bg:#3C3489;
  --toast-c:#EEEDFE;
}
body{font-family:var(--font-sans);color:var(--text);font-size:14px;background:var(--bg)}
.wrap{min-height:100vh;background:var(--bg);padding:0 0 3rem}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 1rem}
.tabs{display:flex;gap:0;overflow-x:auto}
.tab{padding:11px 16px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:color .15s;font-family:inherit}
.tab.active{color:var(--tab-active);border-bottom-color:var(--tab-active);font-weight:500}
.tab:hover:not(.active){color:var(--text)}
.content{padding:1.25rem 1rem;max-width:860px;margin:0 auto}
.page{display:none}.page.active{display:block}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.sec-head h2{font-size:14px;font-weight:500;color:var(--text)}
.btn{padding:7px 14px;font-size:12px;border:1px solid var(--border-mid);border-radius:8px;background:var(--card);cursor:pointer;color:var(--text);transition:background .15s;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--accent-bg)}
.btn.pri{background:var(--accent);color:#FFF8F0;border-color:var(--accent)}
.btn.pri:hover{opacity:.88}
.btn.dan{color:#791F1F;border-color:#F09595}
.btn.dan:hover{background:#FCEBEB}
.btn.sm{padding:5px 10px;font-size:11px}
.back-btn{font-size:12px;cursor:pointer;padding:5px 11px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--text2);font-family:inherit;transition:background .15s}
.back-btn:hover{background:var(--accent-bg)}
.grid-members{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.grid-chars{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px}
.grid-charlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.m-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;cursor:pointer;transition:border-color .15s,background .15s;text-align:center}
.m-card:hover{border-color:var(--border-mid);background:#FFF5E8}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:14px;margin:0 auto 7px}
.m-name{font-size:12px;font-weight:500;color:var(--text)}
.m-sub{font-size:11px;color:var(--text2);margin-top:2px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px;cursor:pointer;transition:border-color .15s}
.cc:hover{border-color:var(--border-mid)}
.cc.sel{border:1.5px solid var(--tab-active);background:#FAFAFE}
.cc-name{font-size:12px;font-weight:500;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.badges{display:flex;gap:3px;flex-wrap:wrap}
.bdg{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500}
.panel{margin-top:10px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.pick-label{font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500}
.pick-btns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.p-btn{padding:5px 10px;font-size:11px;border:1px solid var(--border-mid);border-radius:7px;background:var(--bg);cursor:pointer;color:var(--text);transition:all .15s;font-family:inherit}
.p-btn:hover{background:var(--accent-bg)}
.save-bar{display:flex;justify-content:flex-end;margin-top:1rem;gap:8px}
.search-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.search-row input{flex:1;min-width:140px;padding:8px 11px;font-size:12px;border:1px solid var(--border-mid);border-radius:8px;background:var(--card);color:var(--text);font-family:inherit}
.fil-sec{margin-bottom:.75rem}
.fil-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.fil-btns{display:flex;gap:4px;flex-wrap:wrap}
.f-btn{padding:4px 10px;font-size:11px;border:1px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;color:var(--text2);transition:all .15s;font-family:inherit}
.f-btn:hover{color:var(--text);background:var(--accent-bg)}
.f-btn.on{font-weight:500;color:var(--accent);background:var(--accent-bg);border-color:var(--border-mid)}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:7px}
.av2{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.res-name{font-size:12px;font-weight:500;color:var(--text)}
.reinf-wrap{overflow-x:auto;margin-top:.875rem}
table.rt{border-collapse:collapse;min-width:440px}
table.rt th,table.rt td{border:1px solid var(--border);padding:8px 10px;font-size:12px;text-align:left;vertical-align:middle}
table.rt th{background:var(--accent-bg);font-weight:500;font-size:11px;color:var(--accent);white-space:nowrap}
table.rt td.pair-cell{font-weight:500;cursor:pointer;white-space:nowrap;color:var(--text)}
table.rt td.pair-cell:hover{background:var(--accent-bg)}
table.rt td.check-cell{text-align:center;cursor:pointer;padding:6px}
table.rt td.check-cell:hover{background:#FFF5E8}
.chip{display:inline-flex;align-items:center;gap:3px;background:var(--accent-bg);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:11px;margin:2px;color:var(--text)}
.chip-x{cursor:pointer;color:var(--text3);font-size:11px;margin-left:1px}
.chip-x:hover{color:var(--text)}
.toast-wrap{position:absolute;top:12px;right:12px;z-index:999}
.toast{background:var(--toast-bg);color:var(--toast-c);border-radius:8px;padding:7px 14px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.modal-bg{position:absolute;inset:0;background:rgba(44,34,24,.38);display:flex;align-items:flex-start;justify-content:center;padding-top:60px;z-index:500;min-height:500px}
.modal{background:var(--card);border:1px solid var(--border-mid);border-radius:14px;padding:1.25rem;width:100%;max-width:400px;max-height:75vh;overflow-y:auto}
.modal h3{font-size:14px;font-weight:500;margin-bottom:12px;color:var(--text)}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.field input,.field select{width:100%;padding:7px 10px;font-size:12px;border:1px solid var(--border-mid);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit}
.modal-acts{display:flex;gap:7px;justify-content:flex-end;margin-top:12px}
.popup-m{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:background .15s}
.popup-m:hover{background:var(--accent-bg)}
.sub-tabs{display:flex;gap:5px;margin-bottom:1rem}
.sub-tab{padding:5px 13px;font-size:11px;border:1px solid var(--border-mid);border-radius:20px;cursor:pointer;background:var(--bg);color:var(--text2);transition:all .15s;font-family:inherit}
.sub-tab.active{background:var(--accent);color:#FFF8F0;border-color:var(--accent)}
.c-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px}
.empty{color:var(--text3);text-align:center;padding:1.5rem;font-size:12px}
hr.div{border:none;border-top:1px solid var(--border);margin:1.25rem 0}
.check-dot-on{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.check-dot-off{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-mid);display:inline-flex;align-items:center;justify-content:center}
</style>

<div class="wrap" id="main-wrap">
<div class="top-bar">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('input',this)">① 育成入力</button>
    <button class="tab" onclick="switchTab('search',this)">② 育成検索</button>
    <button class="tab" onclick="switchTab('reinf',this)">③ 援軍表</button>
    <button class="tab" onclick="switchTab('chars',this)">④ キャラ管理</button>
  </div>
</div>

<div class="content" style="position:relative">
<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<!-- ① 育成入力 -->
<div id="page-input" class="page active">
  <div id="v-members">
    <div class="sec-head">
      <h2>メンバーを選択</h2>
      <div style="display:flex;gap:6px">
        <button class="btn" onclick="openMemberModal('add')">+ 追加</button>
        <button class="btn" onclick="openMemberModal('edit')">編集</button>
      </div>
    </div>
    <div class="grid-members" id="member-list"></div>
  </div>
  <div id="v-chars" style="display:none">
    <div class="sec-head">
      <h2 id="editing-name"></h2>
      <button class="back-btn" onclick="goBack()">← 戻る</button>
    </div>
    <div class="grid-chars" id="char-grid-edit"></div>
    <div id="lv-panel" style="display:none">
      <div class="panel">
        <div style="font-size:12px;font-weight:500;margin-bottom:12px;color:var(--text)" id="panel-title"></div>
        <div class="pick-label">レアリティ（1つ選択）</div>
        <div class="pick-btns" id="rar-btns"></div>
        <div class="pick-label">ランク（複数選択可）</div>
        <div class="pick-btns" id="rank-btns"></div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">選択中: <span id="cur-pick-txt" style="font-weight:500;color:var(--text)">未選択</span></div>
      </div>
    </div>
    <div class="save-bar">
      <button class="btn" onclick="goBack()">キャンセル</button>
      <button class="btn pri" onclick="saveTraining()">Save</button>
    </div>
  </div>
  <div id="input-modal-area"></div>
</div>

<!-- ② 育成検索 -->
<div id="page-search" class="page">
  <div class="search-row">
    <input type="text" id="s-input" placeholder="キャラ名を入力..." oninput="renderSearch()">
    <button class="btn pri" onclick="renderSearch()">Search</button>
  </div>
  <div class="fil-sec"><div class="fil-label">レアリティ</div><div class="fil-btns" id="fil-rar"></div></div>
  <div class="fil-sec"><div class="fil-label">ランク</div><div class="fil-btns" id="fil-rank"></div></div>
  <div class="fil-sec"><div class="fil-label">役割</div><div class="fil-btns" id="fil-role"></div></div>
  <div id="search-results"></div>
</div>

<!-- ③ 援軍表 -->
<div id="page-reinf" class="page">
  <div class="sec-head">
    <h2>援軍表</h2>
    <button class="btn" onclick="openAddPairModal()">+ ペア追加</button>
  </div>
  <div class="reinf-wrap"><table class="rt" id="reinf-table"></table></div>
  <div id="reinf-modal-area"></div>
</div>

<!-- ④ キャラ管理 -->
<div id="page-chars" class="page">
  <div class="sec-head"><h2>キャラ管理</h2></div>
  <div class="sub-tabs">
    <button class="sub-tab active" onclick="switchCharMode('new',this)">新規追加</button>
    <button class="sub-tab" onclick="switchCharMode('update',this)">更新</button>
  </div>
  <div id="char-new-form">
    <div class="field"><label>キャラ名</label><input type="text" id="cn-name" placeholder="例: 炎の剣士"></div>
    <div class="field"><label>あり得るレアリティ（複数選択可）</label><div class="pick-btns" id="cn-rar-btns" style="margin-top:4px"></div></div>
    <div class="field"><label>あり得るランク（複数選択可）</label><div class="pick-btns" id="cn-rank-btns" style="margin-top:4px"></div></div>
    <div class="save-bar" style="margin-top:.5rem"><button class="btn pri" onclick="addChar()">追加</button></div>
  </div>
  <div id="char-update-form" style="display:none">
    <div class="field"><label>更新するキャラを選択</label>
      <select id="cu-sel" onchange="loadCharForUpdate()" style="width:100%;padding:7px 10px;font-size:12px;border:1px solid var(--border-mid);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit">
        <option value="">-- 選択 --</option>
      </select>
    </div>
    <div id="cu-detail" style="display:none">
      <div class="field"><label>キャラ名</label><input type="text" id="cu-name" style="width:100%;padding:7px 10px;font-size:12px;border:1px solid var(--border-mid);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit"></div>
      <div class="field"><label>あり得るレアリティ</label><div class="pick-btns" id="cu-rar-btns" style="margin-top:4px"></div></div>
      <div class="field"><label>あり得るランク</label><div class="pick-btns" id="cu-rank-btns" style="margin-top:4px"></div></div>
      <div class="save-bar" style="margin-top:.5rem">
        <button class="btn dan" onclick="deleteChar()">削除</button>
        <button class="btn pri" onclick="updateChar()">更新</button>
      </div>
    </div>
  </div>
  <hr class="div">
  <div class="sec-head"><h2>登録済みキャラ一覧</h2></div>
  <div class="grid-charlist" id="char-list-display"></div>
</div>

</div>
</div>

<script>
const ALL_RARITIES=['LG3','LG2','LG','UR','SR','R','N'];
const ALL_RANKS=['全技極','裏技極','技極','表1','表2','表3','表4','表5','表6','裏1','裏2','裏3','裏4','裏5','裏6'];
const RAR_S={
  'LG3':{bg:'#FAEEDA',c:'#412402',bd:'#EF9F27'},
  'LG2':{bg:'#FAEEDA',c:'#633806',bd:'#BA7517'},
  'LG': {bg:'#FFF0D0',c:'#854F0B',bd:'#EF9F27'},
  'UR': {bg:'#EEEDFE',c:'#3C3489',bd:'#7F77DD'},
  'SR': {bg:'#E6F1FB',c:'#0C447C',bd:'#378ADD'},
  'R':  {bg:'#E1F5EE',c:'#085041',bd:'#1D9E75'},
  'N':  {bg:'#F1EFE8',c:'#5F5E5A',bd:'#B4B2A9'},
};
const TOP_RANKS=['全技極','裏技極','技極'];
const AVC=[
  {bg:'#E6F1FB',c:'#0C447C'},{bg:'#E1F5EE',c:'#085041'},
  {bg:'#FAEEDA',c:'#633806'},{bg:'#FBEAF0',c:'#72243E'},
  {bg:'#EEEDFE',c:'#3C3489'},{bg:'#FAECE7',c:'#993C1D'},
  {bg:'#EAF3DE',c:'#27500A'},{bg:'#FCEBEB',c:'#791F1F'},
];

let S={
  members:[
    {id:1,name:'アリス',role:'リーダー',chars:[{name:'炎の剣士',rar:'UR',ranks:['技極']},{name:'水の魔法師',rar:'SR',ranks:['表3','裏1']}]},
    {id:2,name:'ボブ',role:'メンバー',chars:[{name:'炎の剣士',rar:'LG',ranks:['裏技極','全技極']}]},
    {id:3,name:'チャーリー',role:'メンバー',chars:[{name:'水の魔法師',rar:'LG2',ranks:['全技極']},{name:'聖騎士',rar:'SR',ranks:['技極','表1']}]},
    {id:4,name:'ダイアナ',role:'サブ',chars:[{name:'聖騎士',rar:'R',ranks:['表4','表5']}]},
  ],
  chars:[
    {name:'炎の剣士',rars:['LG3','LG2','LG','UR','SR'],ranks:['全技極','裏技極','技極','表1','表2','表3']},
    {name:'水の魔法師',rars:['LG2','LG','UR','SR','R'],ranks:['全技極','裏技極','技極','表1','表2','表3','表4']},
    {name:'聖騎士',rars:['UR','SR','R','N'],ranks:['技極','表1','表2','表3','表4','表5','表6']},
    {name:'影のハンター',rars:['LG','UR','SR'],ranks:['全技極','裏技極','技極','表1','表2']},
  ],
  reinf:[],
  nextId:5,
  filRar:[],filRank:[],filRole:[],
};
let E={memberId:null,charName:null,pendingRar:null,pendingRanks:[]};
let cnSelRar=[],cnSelRank=[],cuSelRar=[],cuSelRank=[];

function esc(s){return(s||'').replace(/'/g,"\\'");}
function av(i){return AVC[i%AVC.length];}
function ini(n){return n.slice(0,2).toUpperCase();}
function rarBdg(r){const s=RAR_S[r]||{bg:'#F1EFE8',c:'#5F5E5A',bd:'#B4B2A9'};return`<span class="bdg" style="background:${s.bg};color:${s.c};border:.5px solid ${s.bd}">${r}</span>`;}
function rankBdg(r){const top=TOP_RANKS.includes(r);return`<span class="bdg" style="background:${top?'#EEEDFE':'#F1EFE8'};color:${top?'#3C3489':'#5F5E5A'};border:.5px solid ${top?'#AFA9EC':'#D3D1C7'}">${r}</span>`;}

async function load(){
  try{const r=await window.storage.get('tracker-v6',true);if(r&&r.value)S=JSON.parse(r.value);}catch(e){}
  renderAll();
}
async function sv(){try{await window.storage.set('tracker-v6',JSON.stringify(S),true);}catch(e){}}
function renderAll(){renderMembers();renderCharListDisplay();renderReinfTable();renderFilters();renderCharUpdateSel();}

function renderMembers(){
  const el=document.getElementById('member-list');
  if(!S.members.length){el.innerHTML='<div class="empty">メンバーがいません</div>';return;}
  el.innerHTML=S.members.map((m,i)=>{const a=av(i);return`<div class="m-card" onclick="selectMember(${m.id})">
    <div class="avatar" style="background:${a.bg};color:${a.c}">${ini(m.name)}</div>
    <div class="m-name">${m.name}</div>
    <div class="m-sub">${m.role}</div>
    <div class="m-sub">${m.chars.length}体育成中</div>
  </div>`;}).join('');
}

function selectMember(id){
  const m=S.members.find(x=>x.id===id);if(!m)return;
  E={memberId:id,charName:null,pendingRar:null,pendingRanks:[]};
  document.getElementById('editing-name').textContent=m.name+' の育成キャラ';
  document.getElementById('v-members').style.display='none';
  document.getElementById('v-chars').style.display='block';
  renderCharGridEdit(m);
  document.getElementById('lv-panel').style.display='none';
}

function renderCharGridEdit(m){
  document.getElementById('char-grid-edit').innerHTML=S.chars.map(cd=>{
    const c=m.chars.find(x=>x.name===cd.name);const isSel=E.charName===cd.name;
    return`<div class="cc${isSel?' sel':''}" onclick="selectCharEdit('${esc(cd.name)}')">
      <div class="cc-name" title="${cd.name}">${cd.name}</div>
      <div class="badges">${c?rarBdg(c.rar):''}${c&&c.ranks?c.ranks.map(rankBdg).join(''):''}
      ${!c?'<span style="font-size:10px;color:var(--text3)">未育成</span>':''}</div>
    </div>`;
  }).join('');
}

function selectCharEdit(cn){
  const m=S.members.find(x=>x.id===E.memberId);
  const c=m&&m.chars.find(x=>x.name===cn);
  const cd=S.chars.find(x=>x.name===cn);
  E.charName=cn;E.pendingRar=c?c.rar:null;E.pendingRanks=c&&c.ranks?[...c.ranks]:[];
  document.getElementById('panel-title').textContent=cn+' の育成状況';
  const availRar=cd?cd.rars:ALL_RARITIES;
  const availRank=cd?cd.ranks:ALL_RANKS;
  document.getElementById('rar-btns').innerHTML=availRar.map(r=>{
    const s=RAR_S[r]||{};const isSel=E.pendingRar===r;
    return`<button class="p-btn" onclick="pickRar('${r}')" style="${isSel?`background:${s.bg};color:${s.c};border-color:${s.bd};font-weight:500`:''}">${r}</button>`;
  }).join('');
  document.getElementById('rank-btns').innerHTML=availRank.map(r=>{
    const isSel=E.pendingRanks.includes(r);const top=TOP_RANKS.includes(r);
    return`<button class="p-btn" onclick="pickRank('${r}')" style="${isSel?`background:${top?'#EEEDFE':'#EDE5D8'};color:${top?'#3C3489':'#634B38'};border-color:${top?'#AFA9EC':'#B4A494'};font-weight:500`:''}">${r}${isSel?'<span style="margin-left:2px;font-size:9px">✓</span>':''}</button>`;
  }).join('');
  document.getElementById('lv-panel').style.display='block';
  document.getElementById('cur-pick-txt').textContent=E.pendingRar&&E.pendingRanks.length?E.pendingRar+' / '+E.pendingRanks.join('・'):E.pendingRar?E.pendingRar+' (ランク未選択)':'未選択';
  renderCharGridEdit(m);
}

function pickRar(r){E.pendingRar=r;selectCharEdit(E.charName);}
function pickRank(r){const i=E.pendingRanks.indexOf(r);if(i>=0)E.pendingRanks.splice(i,1);else E.pendingRanks.push(r);selectCharEdit(E.charName);}

function saveTraining(){
  if(!E.charName){toast('キャラを選んでください');return;}
  if(!E.pendingRar||!E.pendingRanks.length){toast('レアリティとランクを選んでください');return;}
  const m=S.members.find(x=>x.id===E.memberId);
  const ex=m.chars.find(c=>c.name===E.charName);
  if(ex){ex.rar=E.pendingRar;ex.ranks=[...E.pendingRanks];}
  else m.chars.push({name:E.charName,rar:E.pendingRar,ranks:[...E.pendingRanks]});
  sv();renderAll();toast('保存しました');goBack();
}

function goBack(){
  document.getElementById('v-members').style.display='';
  document.getElementById('v-chars').style.display='none';
  E={memberId:null,charName:null,pendingRar:null,pendingRanks:[]};
}

function openMemberModal(mode){
  const area=document.getElementById('input-modal-area');
  if(mode==='add'){
    area.innerHTML=buildModalBg(`<h3>メンバー追加</h3>
      <div class="field"><label>名前</label><input type="text" id="mm-name" placeholder="例: たなか"></div>
      <div class="field"><label>役割</label><input type="text" id="mm-role" placeholder="例: リーダー"></div>
      <div class="modal-acts"><button class="btn" onclick="clearArea('input-modal-area')">キャンセル</button><button class="btn pri" onclick="addMember()">追加</button></div>`);
  } else {
    if(!S.members.length){toast('メンバーがいません');return;}
    area.innerHTML=buildModalBg(`<h3>メンバー編集</h3>
      <div class="field"><label>メンバーを選択</label>
        <select id="me-sel" onchange="loadMemberEdit()"><option value="">-- 選択 --</option>${S.members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select>
      </div>
      <div id="me-detail" style="display:none">
        <div class="field"><label>名前</label><input type="text" id="me-name"></div>
        <div class="field"><label>役割</label><input type="text" id="me-role"></div>
        <div class="modal-acts"><button class="btn dan" onclick="deleteMember()">削除</button><button class="btn" onclick="clearArea('input-modal-area')">キャンセル</button><button class="btn pri" onclick="saveMemberEdit()">保存</button></div>
      </div>`);
  }
}

function buildModalBg(inner){return`<div class="modal-bg" onclick="if(event.target===this)this.remove()"><div class="modal">${inner}</div></div>`;}
function clearArea(id){const el=document.getElementById(id);if(el)el.innerHTML='';}

function loadMemberEdit(){
  const id=parseInt(document.getElementById('me-sel').value);
  const m=S.members.find(x=>x.id===id);
  if(!m){document.getElementById('me-detail').style.display='none';return;}
  document.getElementById('me-name').value=m.name;
  document.getElementById('me-role').value=m.role;
  document.getElementById('me-detail').style.display='block';
}
function saveMemberEdit(){
  const id=parseInt(document.getElementById('me-sel').value);
  const m=S.members.find(x=>x.id===id);if(!m)return;
  const name=document.getElementById('me-name').value.trim();
  const role=document.getElementById('me-role').value.trim();
  if(!name)return;
  m.name=name;m.role=role||m.role;sv();renderAll();clearArea('input-modal-area');toast('更新しました');
}
function deleteMember(){
  const id=parseInt(document.getElementById('me-sel').value);
  S.members=S.members.filter(x=>x.id!==id);
  sv();renderAll();clearArea('input-modal-area');toast('削除しました');
}
function addMember(){
  const name=document.getElementById('mm-name').value.trim();
  const role=document.getElementById('mm-role').value.trim();
  if(!name)return;
  S.members.push({id:S.nextId++,name,role:role||'メンバー',chars:[]});
  sv();renderAll();clearArea('input-modal-area');toast('追加しました');
}

function renderFilters(){
  const allRoles=[...new Set(S.members.map(m=>m.role))];
  document.getElementById('fil-rar').innerHTML=ALL_RARITIES.map(r=>{const on=S.filRar.includes(r);const s=RAR_S[r]||{};return`<button class="f-btn${on?' on':''}" onclick="toggleFil('rar','${r}')" style="${on?`background:${s.bg};color:${s.c};border-color:${s.bd}`:''}"> ${r}</button>`;}).join('');
  document.getElementById('fil-rank').innerHTML=ALL_RANKS.map(r=>{const on=S.filRank.includes(r);const top=TOP_RANKS.includes(r);return`<button class="f-btn${on?' on':''}" onclick="toggleFil('rank','${r}')" style="${on?(top?'background:#EEEDFE;color:#3C3489;border-color:#AFA9EC':'background:#EDE5D8;color:#634B38;border-color:#B4A494'):''}"> ${r}</button>`;}).join('');
  document.getElementById('fil-role').innerHTML=allRoles.map(r=>{const on=S.filRole.includes(r);return`<button class="f-btn${on?' on':''}" onclick="toggleFil('role','${r}')"> ${r}</button>`;}).join('');
}
function toggleFil(type,val){const key=type==='rar'?'filRar':type==='rank'?'filRank':'filRole';const i=S[key].indexOf(val);if(i>=0)S[key].splice(i,1);else S[key].push(val);renderFilters();renderSearch();}

function renderSearch(){
  const q=(document.getElementById('s-input').value||'').trim();
  const el=document.getElementById('search-results');
  if(!q){el.innerHTML='<div class="empty">キャラ名を入力してください</div>';return;}
  const matched=S.chars.filter(cd=>cd.name.includes(q));
  if(!matched.length){el.innerHTML='<div class="empty">該当キャラが見つかりません</div>';return;}
  let rows=[];
  matched.forEach(cd=>{S.members.forEach((m,mi)=>{
    const c=m.chars.find(x=>x.name===cd.name);if(!c)return;
    if(S.filRar.length&&!S.filRar.includes(c.rar))return;
    if(S.filRank.length&&!S.filRank.some(fr=>c.ranks&&c.ranks.includes(fr)))return;
    if(S.filRole.length&&!S.filRole.includes(m.role))return;
    const a=av(mi);
    rows.push(`<div class="res-card"><div class="av2" style="background:${a.bg};color:${a.c}">${ini(m.name)}</div>
      <div style="flex:1;min-width:0"><div class="res-name">${m.name} <span style="font-size:10px;color:var(--text2)">${m.role}</span></div>
      <div style="font-size:10px;color:var(--text2);margin:1px 0">${cd.name}</div>
      <div class="badges" style="margin-top:3px">${rarBdg(c.rar)}${c.ranks?c.ranks.map(rankBdg).join(''):''}</div></div></div>`);
  });});
  if(!rows.length){el.innerHTML='<div class="empty">条件に合うメンバーがいません</div>';return;}
  el.innerHTML=`<div style="font-size:11px;color:var(--text2);margin-bottom:7px">${rows.length}件</div>`+rows.join('');
}

function renderReinfTable(){
  const tbl=document.getElementById('reinf-table');
  if(!S.reinf.length){
    tbl.innerHTML='<tr><td style="color:var(--text3);text-align:center;padding:1.5rem;border:1px solid var(--border)">「+ ペア追加」で大将・副将のペアを追加してください</td></tr>';
    return;
  }
  const headerCells=S.members.map(m=>{const a=av(S.members.indexOf(m));return`<th style="text-align:center;min-width:64px"><div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div style="width:24px;height:24px;border-radius:50%;background:${a.bg};color:${a.c};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500">${ini(m.name)}</div><span>${m.name}</span></div></th>`;}).join('');
  let html=`<thead><tr><th style="min-width:140px">大将 - 副将</th>${headerCells}</tr></thead><tbody>`;
  S.reinf.forEach((row,ri)=>{
    const pairTxt=row.sub?`${row.main} - ${row.sub}`:`${row.main} - <span style="color:var(--text3);font-size:11px">未設定</span>`;
    const cells=S.members.map(m=>{
      const on=row.members.includes(m.name);
      const a=av(S.members.indexOf(m));
      return`<td class="check-cell" onclick="toggleCellMember(${ri},'${esc(m.name)}')">
        ${on?`<div class="check-dot-on" style="background:${a.bg};color:${a.c};margin:0 auto">✓</div>`:`<div class="check-dot-off" style="margin:0 auto"></div>`}
      </td>`;
    }).join('');
    html+=`<tr><td class="pair-cell" onclick="openPairEditModal(${ri})">${pairTxt}</td>${cells}</tr>`;
  });
  html+='</tbody>';
  tbl.innerHTML=html;
}

function toggleCellMember(ri,name){
  const row=S.reinf[ri];const i=row.members.indexOf(name);
  if(i>=0)row.members.splice(i,1);else row.members.push(name);
  sv();renderReinfTable();
}

function openAddPairModal(){
  const area=document.getElementById('reinf-modal-area');
  const opts=S.chars.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
  area.innerHTML=buildModalBg(`<h3>ペア追加（大将・副将）</h3>
    <div class="field"><label>大将</label><select id="pair-main"><option value="">-- 選択 --</option>${opts}</select></div>
    <div class="field"><label>副将（任意）</label><select id="pair-sub"><option value="">なし</option>${opts}</select></div>
    <div class="modal-acts"><button class="btn" onclick="clearArea('reinf-modal-area')">キャンセル</button><button class="btn pri" onclick="doAddPair()">追加</button></div>`);
}
function doAddPair(){
  const main=document.getElementById('pair-main').value;
  const sub=document.getElementById('pair-sub').value||null;
  if(!main){toast('大将を選択してください');return;}
  S.reinf.push({main,sub,members:[]});
  sv();renderReinfTable();clearArea('reinf-modal-area');toast('追加しました');
}
function openPairEditModal(ri){
  const row=S.reinf[ri];
  const area=document.getElementById('reinf-modal-area');
  const opts=S.chars.map(c=>`<option value="${c.name}"${c.name===row.main?' selected':''}>${c.name}</option>`).join('');
  const subOpts=`<option value=""${!row.sub?' selected':''}>なし</option>`+S.chars.map(c=>`<option value="${c.name}"${c.name===row.sub?' selected':''}>${c.name}</option>`).join('');
  area.innerHTML=buildModalBg(`<h3>ペア編集</h3>
    <div class="field"><label>大将</label><select id="ep-main">${opts}</select></div>
    <div class="field"><label>副将（任意）</label><select id="ep-sub">${subOpts}</select></div>
    <div class="modal-acts">
      <button class="btn dan" onclick="deletePair(${ri})">削除</button>
      <button class="btn" onclick="clearArea('reinf-modal-area')">キャンセル</button>
      <button class="btn pri" onclick="savePairEdit(${ri})">保存</button>
    </div>`);
}
function savePairEdit(ri){
  S.reinf[ri].main=document.getElementById('ep-main').value;
  S.reinf[ri].sub=document.getElementById('ep-sub').value||null;
  sv();renderReinfTable();clearArea('reinf-modal-area');toast('更新しました');
}
function deletePair(ri){S.reinf.splice(ri,1);sv();renderReinfTable();clearArea('reinf-modal-area');toast('削除しました');}

function renderCharMgmtRarBtns(elId,sel,fn){
  document.getElementById(elId).innerHTML=ALL_RARITIES.map(r=>{const on=sel.includes(r);const s=RAR_S[r]||{};return`<button class="p-btn" onclick="${fn}('${r}')" style="${on?`background:${s.bg};color:${s.c};border-color:${s.bd};font-weight:500`:''}">${r}${on?'<span style="margin-left:2px;font-size:9px">✓</span>':''}</button>`;}).join('');
}
function renderCharMgmtRankBtns(elId,sel,fn){
  document.getElementById(elId).innerHTML=ALL_RANKS.map(r=>{const on=sel.includes(r);const top=TOP_RANKS.includes(r);return`<button class="p-btn" onclick="${fn}('${r}')" style="${on?`background:${top?'#EEEDFE':'#EDE5D8'};color:${top?'#3C3489':'#634B38'};border-color:${top?'#AFA9EC':'#B4A494'};font-weight:500`:''}">${r}${on?'<span style="margin-left:2px;font-size:9px">✓</span>':''}</button>`;}).join('');
}
function toggleCnRar(r){const i=cnSelRar.indexOf(r);if(i>=0)cnSelRar.splice(i,1);else cnSelRar.push(r);renderCharMgmtRarBtns('cn-rar-btns',cnSelRar,'toggleCnRar');renderCharMgmtRankBtns('cn-rank-btns',cnSelRank,'toggleCnRank');}
function toggleCnRank(r){const i=cnSelRank.indexOf(r);if(i>=0)cnSelRank.splice(i,1);else cnSelRank.push(r);renderCharMgmtRarBtns('cn-rar-btns',cnSelRar,'toggleCnRar');renderCharMgmtRankBtns('cn-rank-btns',cnSelRank,'toggleCnRank');}
function toggleCuRar(r){const i=cuSelRar.indexOf(r);if(i>=0)cuSelRar.splice(i,1);else cuSelRar.push(r);renderCharMgmtRarBtns('cu-rar-btns',cuSelRar,'toggleCuRar');renderCharMgmtRankBtns('cu-rank-btns',cuSelRank,'toggleCuRank');}
function toggleCuRank(r){const i=cuSelRank.indexOf(r);if(i>=0)cuSelRank.splice(i,1);else cuSelRank.push(r);renderCharMgmtRarBtns('cu-rar-btns',cuSelRar,'toggleCuRar');renderCharMgmtRankBtns('cu-rank-btns',cuSelRank,'toggleCuRank');}
function initCharNewForm(){cnSelRar=[];cnSelRank=[];document.getElementById('cn-name').value='';renderCharMgmtRarBtns('cn-rar-btns',cnSelRar,'toggleCnRar');renderCharMgmtRankBtns('cn-rank-btns',cnSelRank,'toggleCnRank');}
function addChar(){
  const name=document.getElementById('cn-name').value.trim();
  if(!name){toast('キャラ名を入力してください');return;}
  if(S.chars.find(c=>c.name===name)){toast('同名のキャラが既に存在します');return;}
  S.chars.push({name,rars:[...cnSelRar],ranks:[...cnSelRank]});
  sv();renderAll();initCharNewForm();toast(name+'を追加しました');
}
function renderCharUpdateSel(){const sel=document.getElementById('cu-sel');if(!sel)return;sel.innerHTML='<option value="">-- 選択 --</option>'+S.chars.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');document.getElementById('cu-detail').style.display='none';}
function loadCharForUpdate(){const name=document.getElementById('cu-sel').value;const cd=S.chars.find(c=>c.name===name);if(!cd){document.getElementById('cu-detail').style.display='none';return;}document.getElementById('cu-name').value=cd.name;cuSelRar=[...cd.rars];cuSelRank=[...cd.ranks];renderCharMgmtRarBtns('cu-rar-btns',cuSelRar,'toggleCuRar');renderCharMgmtRankBtns('cu-rank-btns',cuSelRank,'toggleCuRank');document.getElementById('cu-detail').style.display='block';}
function updateChar(){const oldName=document.getElementById('cu-sel').value;const newName=document.getElementById('cu-name').value.trim();if(!newName){toast('キャラ名を入力してください');return;}const cd=S.chars.find(c=>c.name===oldName);if(!cd)return;if(newName!==oldName&&S.chars.find(c=>c.name===newName)){toast('同名のキャラが既に存在します');return;}cd.name=newName;cd.rars=[...cuSelRar];cd.ranks=[...cuSelRank];if(newName!==oldName){S.members.forEach(m=>m.chars.forEach(c=>{if(c.name===oldName)c.name=newName;}));S.reinf.forEach(r=>{if(r.main===oldName)r.main=newName;if(r.sub===oldName)r.sub=newName;});}sv();renderAll();toast('更新しました');}
function deleteChar(){const name=document.getElementById('cu-sel').value;if(!name)return;S.chars=S.chars.filter(c=>c.name!==name);S.members.forEach(m=>{m.chars=m.chars.filter(c=>c.name!==name);});S.reinf=S.reinf.filter(r=>r.main!==name&&r.sub!==name);sv();renderAll();document.getElementById('cu-detail').style.display='none';toast('削除しました');}
function renderCharListDisplay(){const el=document.getElementById('char-list-display');if(!el)return;if(!S.chars.length){el.innerHTML='<div class="empty">キャラが登録されていません</div>';return;}el.innerHTML=S.chars.map(cd=>`<div class="c-card"><div style="font-size:12px;font-weight:500;margin-bottom:5px;color:var(--text)">${cd.name}</div><div style="font-size:10px;color:var(--text2);margin-bottom:3px">レアリティ</div><div class="badges" style="margin-bottom:5px">${cd.rars.map(rarBdg).join('')||'<span style="font-size:10px;color:var(--text3)">未設定</span>'}</div><div style="font-size:10px;color:var(--text2);margin-bottom:3px">ランク</div><div class="badges">${cd.ranks.map(rankBdg).join('')||'<span style="font-size:10px;color:var(--text3)">未設定</span>'}</div></div>`).join('');}
function switchCharMode(mode,el){document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById('char-new-form').style.display=mode==='new'?'block':'none';document.getElementById('char-update-form').style.display=mode==='update'?'block':'none';if(mode==='new')initCharNewForm();if(mode==='update')renderCharUpdateSel();}
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  clearArea('input-modal-area');clearArea('reinf-modal-area');
  if(tab==='search'){renderFilters();renderSearch();}
  if(tab==='reinf')renderReinfTable();
  if(tab==='chars'){initCharNewForm();renderCharListDisplay();}
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

load();
</script>
