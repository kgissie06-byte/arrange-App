app = "game-tracker"          # ← flyctl launch 後に自動で書き換わります
primary_region = "nrt"        # 東京リージョン

[build]

[http_service]
  internal_port = 3000
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
